name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Integration (PHP ${{ matrix.php }}, TYPO3 ${{ matrix.typo3 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            typo3: '^13.4'
          - php: '8.4'
            typo3: '^14.3'

    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: typo3_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, intl, gd, zip, fileinfo, mbstring
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install test client dependencies
        working-directory: Tests/Integration
        run: npm install

      - name: Setup TYPO3 project
        env:
          TYPO3_VERSION: ${{ matrix.typo3 }}
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: typo3_test
          DB_USER: root
          DB_PASS: root
          TYPO3_PROJECT_PATH: /tmp/typo3-project
          EXTENSION_PATH: ${{ github.workspace }}
        run: bash Tests/Integration/setup-typo3.sh

      - name: Run integration tests
        env:
          TYPO3_PATH: /tmp/typo3-project
          CI: true
        working-directory: Tests/Integration
        run: node run-tests.mjs
