services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  MarekSkopal\MsMcpServer\:
    resource: '../Classes/*'

  MarekSkopal\MsMcpServer\Tool\:
    resource: '../Classes/Tool/*'
    public: true

  MarekSkopal\MsMcpServer\Command\CleanupExpiredTokensCommand:
    tags:
      - name: 'console.command'
        command: 'mcp:cleanup'
        description: 'Remove expired and revoked OAuth authorizations and stale MCP session files'

  MarekSkopal\MsMcpServer\Command\McpServerCommand:
    tags:
      - name: 'console.command'
        command: 'mcp:server'
        description: 'Start the MCP server using stdio transport for local AI tool integration'
