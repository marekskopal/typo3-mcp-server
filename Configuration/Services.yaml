services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  MarekSkopal\MsMcpServer\:
    resource: '../Classes/*'

  MarekSkopal\MsMcpServer\Tool\:
    resource: '../Classes/Tool/*'
    exclude:
      - '../Classes/Tool/Result/*'
      - '../Classes/Tool/Dynamic/*'
      - '../Classes/Tool/Search/SearchConditionParser.php'
    public: true
    tags:
      - name: 'mcp.tool'

  MarekSkopal\MsMcpServer\Prompt\:
    resource: '../Classes/Prompt/*'
    public: true
    tags:
      - name: 'mcp.prompt'

  MarekSkopal\MsMcpServer\Resource\:
    resource: '../Classes/Resource/*'
    exclude: '../Classes/Resource/Result/*'
    public: true
    tags:
      - name: 'mcp.resource'

  MarekSkopal\MsMcpServer\Server\McpServerFactory:
    arguments:
      $tools: !tagged_iterator mcp.tool
      $resources: !tagged_iterator mcp.resource
      $prompts: !tagged_iterator mcp.prompt

  MarekSkopal\MsMcpServer\Command\CleanupExpiredTokensCommand:
    tags:
      - name: 'console.command'
        command: 'mcp:cleanup'
        description: 'Remove expired and revoked OAuth authorizations and stale MCP session files'

  MarekSkopal\MsMcpServer\Command\McpServerCommand:
    tags:
      - name: 'console.command'
        command: 'mcp:server'
        description: 'Start the MCP server using stdio transport for local AI tool integration'
