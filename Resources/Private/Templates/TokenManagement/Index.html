<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <f:flashMessages queueIdentifier="msmcpserver.tokens" />

    <h2>Create New Token</h2>
    <form method="post" action="{f:be.uri(route: 'system_msmcpserver_tokens.create')}">
        <div class="form-group mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" name="name" id="name" class="form-control" required="required" placeholder="Token description" />
        </div>
        <div class="form-group mb-3">
            <label for="be_user" class="form-label">Backend User</label>
            <select name="be_user" id="be_user" class="form-select" required="required">
                <option value="">-- Select user --</option>
                <f:for each="{beUsers}" as="user">
                    <option value="{user.uid}">{user.username}</option>
                </f:for>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Create Token</button>
    </form>

    <h2 class="mt-5">Existing Tokens</h2>
    <f:if condition="{tokens}">
        <f:then>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>User</th>
                        <th>Created</th>
                        <th>Expires</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{tokens}" as="token">
                        <tr>
                            <td>{token.name}</td>
                            <td>{token.username}</td>
                            <td><f:format.date format="Y-m-d H:i">{token.crdate}</f:format.date></td>
                            <td>
                                <f:if condition="{token.expires}">
                                    <f:then><f:format.date format="Y-m-d H:i">{token.expires}</f:format.date></f:then>
                                    <f:else>Never</f:else>
                                </f:if>
                            </td>
                            <td>
                                <f:if condition="{token.hidden}">
                                    <f:then><span class="badge bg-danger">Disabled</span></f:then>
                                    <f:else><span class="badge bg-success">Active</span></f:else>
                                </f:if>
                            </td>
                            <td>
                                <form method="post" action="{f:be.uri(route: 'system_msmcpserver_tokens.delete')}" style="display:inline">
                                    <input type="hidden" name="uid" value="{token.uid}" />
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this token?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </f:then>
        <f:else>
            <p class="text-muted">No tokens found.</p>
        </f:else>
    </f:if>
</f:section>

</html>
